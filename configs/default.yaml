# ─── Data Paths ───────────────────────────────────────────
data:
  raw_path: "data/raw/combined_tire_data_15k_cleaned.jsonl"
  processed_dir: "data/processed"
  graph_filename: "hetero_graph.pt"

# ─── Tire Node Features ──────────────────────────────────
# Continuous features to normalize with StandardScaler
tire_features:
  continuous:
    - price
    - average_rating
    - rating_number
    - treadwear
  categorical:
    - traction
    - temperature
    - speed_rating

# ─── Graph Construction ──────────────────────────────────
graph:
  # Include reverse edges for bidirectional message passing
  add_reverse_edges: true
  # Use review rating as edge weight
  use_rating_as_edge_weight: true
