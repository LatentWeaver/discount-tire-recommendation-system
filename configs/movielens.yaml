# Config for the MovieLens-100K (50K subsample) graph build.
# Maps MovieLens onto the same node-type schema as the rest of the pipeline:
#   user → ML user_id   tire → movie   brand → primary genre   size → release decade

data:
  ratings_path: "data/raw/ml-100k/u.data.50k"
  users_path:   "data/raw/ml-100k/u.user.50k"
  items_path:   "data/raw/ml-100k/u.item.50k"
  processed_dir: "data/processed"
  graph_filename: "hetero_graph_movielens.pt"

graph:
  add_reverse_edges: true
  use_rating_as_edge_weight: true
